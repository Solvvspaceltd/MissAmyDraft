<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Miss Amy's Daycare</title>
  <link rel="icon" href="Img/favicon_missamy" type="image/x-icon">
  <link rel="stylesheet" href="Css/style.css">
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="page-hero">
    <span class="section-label">Gallery</span>
    <h1>Life at Miss Amy's Daycare</h1>
    <p>A glimpse into the warm, playful and educational environment we've created for every child in our care.</p>
  </div>

  <div class="gallery-section">

    <!-- SLIDESHOW -->
    <div class="slideshow-wrap fade-in">
      <div class="slideshow" id="slideshow">
        <div class="slide active">
          <div class="slide-placeholder" style="background-image: url('Img/IMG-1.jpg'); background-size: cover; background-position: center;">
            <span class="slide-label"></span>
          </div>
          <div class="slide-caption">
            <h3></h3>
            <p></p>
          </div>
        </div>
        <div class="slide">
          <div class="slide-placeholder" style="background-image: url('Img/IMG-2.jpg'); background-size: cover; background-position: center;">
            <span class="slide-label"></span>
          </div>
          <div class="slide-caption">
            <h3></h3>
            <p></p>
          </div>
        </div>
        <div class="slide">
          <div class="slide-placeholder" style="background-image: url('Img/IMG-3.jpg'); background-size: cover; background-position: center;">
            <span class="slide-label"></span>
          </div>
          <div class="slide-caption">
            <h3></h3>
            <p></p>
          </div>
        </div>
        <div class="slide">
          <div class="slide-placeholder" style="background-image: url('Img/IMG-4.jpg'); background-size: cover; background-position: center;">
            <span class="slide-label"></span>
          </div>
          <div class="slide-caption">
            <h3></h3>
            <p></p>
          </div>
        </div>
        <div class="slide">
          <div class="slide-placeholder" style="background-image: url('Img/IMG-5.jpg'); background-size: cover; background-position: center;">
            <span class="slide-label"></span>
          </div>
          <div class="slide-caption">
            <h3></h3>
            <p></p>
          </div>
        </div>
        <button class="slide-btn prev" onclick="changeSlide(-1)">&#8592;</button>
        <button class="slide-btn next" onclick="changeSlide(1)">&#8594;</button>
      </div>
      <div class="slide-dots" id="dots"></div>
    </div>

    <!-- CATEGORIES -->
    <div style="max-width:1000px;margin:0 auto">
      <div class="gallery-categories">
        <button class="cat-btn active" onclick="filterGallery('all', this)">All</button>
        <button class="cat-btn" onclick="filterGallery('learning', this)">Learning &amp; Curriculum</button>
        <button class="cat-btn" onclick="filterGallery('outdoor', this)">Outdoor Play</button>
        <button class="cat-btn" onclick="filterGallery('creative', this)">Creative Activities</button>
        <button class="cat-btn" onclick="filterGallery('trips', this)">Trips &amp; Outings</button>
        <button class="cat-btn" onclick="filterGallery('sen', this)">SEN &amp; Inclusion</button>
        <button class="cat-btn" onclick="filterGallery('uniforms', this)" id="uniforms">Uniforms &amp; Dress Code</button>
      </div>

      <div class="gallery-grid" id="gallery-grid">
       
        <div class="gallery-thumb" data-cat="uniforms" style="background-image: url('Img/IMG-1.jpg'); background-size: cover; background-position: center;"><span class="thumb-label"></span><div class="thumb-overlay"><span>Lightweight summer collection</span></div></div>
        <div class="gallery-thumb" data-cat="uniforms" style="background-image: url('Img/IMG-2.jpg'); background-size: cover; background-position: center;"><span class="thumb-label"></span><div class="thumb-overlay"><span></span></div></div>
        <div class="gallery-thumb" data-cat="learning" style="background-image: url('Img/IMG-3.jpg'); background-size: cover; background-position: center;"><span class="thumb-label"></span><div class="thumb-overlay"><span></span></div></div>
        <div class="gallery-thumb" data-cat="creative" style="background-image: url('Img/IMG-4.jpg'); background-size: cover; background-position: center;"><span class="thumb-label"></span><div class="thumb-overlay"><span></span></div></div>
        <div class="gallery-thumb" data-cat="creative" style="background-image: url('Img/IMG-5.jpg'); background-size: cover; background-position: center;"><span class="thumb-label"></span><div class="thumb-overlay"><span></span></div></div>
      </div>
      <p style="text-align:center;font-size:14px;color:var(--muted);margin-top:24px">Photos will be added by Miss Amy. All images shared with full parental consent in line with our <a href="policies.html#gdpr">GDPR policy</a>.</p>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script src="Js/shared.js"></script>
  <script>
    renderNav('gallery.html');
    renderFooter();
    initFadeIn();

    // Slideshow
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const dotsContainer = document.getElementById('dots');

    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.onclick = () => goTo(i);
      dotsContainer.appendChild(d);
    });

    function goTo(n) {
      slides[current].classList.remove('active');
      dotsContainer.children[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      dotsContainer.children[current].classList.add('active');
    }
    function changeSlide(dir) { goTo(current + dir); }
    setInterval(() => changeSlide(1), 5000);

    // Gallery filter
    function filterGallery(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.gallery-thumb').forEach(t => {
        t.style.display = (cat === 'all' || t.dataset.cat === cat) ? 'flex' : 'none';
      });
    }
  </script>
</body>
</html>
